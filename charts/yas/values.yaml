  domain: yas.lethanhcong.site

  # --- Infrastructure references ---
  postgresql:
    host: postgresql.postgres
    port: "5432"
    username: yasadminuser
    password: pR6aHLoj6V9MebF7Zel36hUTo8MjLqKh7fPZHC5eJeEW3rkHNtpI6UUJpH7dzZAh

  kafka:
    bootstrapServers: kafka-cluster-kafka-brokers.kafka:9092

  redis:
    host: redis-master.redis
    port: "6379"
    password: redis

  keycloak:
    issuerUri: http://identity.yas.lethanhcong.site/auth/realms/Yas
    authUrl: http://identity.yas.lethanhcong.site/auth/realms/Yas/protocol/openid-connect/auth
    tokenUrl: http://identity.yas.lethanhcong.site/auth/realms/Yas/protocol/openid-connect/token
    backofficeBffClientSecret: TVacLC0cQ8tiiEKiTVerTb2YvwQ1TRJF
    storefrontBffClientSecret: ZrU9I0q2uXBglBnmvyJdkl1lf0ncr8tn
