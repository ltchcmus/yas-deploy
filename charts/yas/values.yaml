    password: JbqJhEPOFE9VskmOLX4OXSod

# ============================================================
# Services
# type: backend | ui | swagger
#   backend = Spring Boot (port 80, metric 8090, needs DB)
#   ui      = Next.js (port 3000, needs API_BASE_PATH)
#   swagger = Stock swagger-ui image
# ============================================================

services:
  # 1. product
  product:
    enabled: true
    tag: latest
    containerPort: 80
    nodePort: 30080
    type: backend
    databaseName: product

  # 2. cart
  cart:
    enabled: true
    tag: latest
    containerPort: 80
    nodePort: 30081
    type: backend
    databaseName: cart

  # 3. order
  order:
    enabled: true
    tag: latest
    containerPort: 80
    nodePort: 30082
    type: backend
    databaseName: order

  # 4. customer
  customer:
    enabled: true
    tag: latest
    containerPort: 80
    nodePort: 30083
    type: backend
    databaseName: customer

  # 5. inventory
  inventory:
    enabled: true
    tag: latest
    containerPort: 80
    nodePort: 30084
    type: backend
    databaseName: inventory

  # 6. tax
  tax:
    enabled: true
    tag: latest
    containerPort: 80
    nodePort: 30085
    type: backend
    databaseName: tax

  # 7. media
  media:
    enabled: true
    tag: latest
    containerPort: 80
    nodePort: 30086
    type: backend
    databaseName: media

  # 8. search
  search:
    enabled: true
    tag: latest
    containerPort: 80
    nodePort: 30087
    type: backend
    databaseName: search
    podAnnotations:
      traffic.sidecar.istio.io/excludeOutboundPorts: "9200"

  # 9. storefront-bff
  storefront-bff:
    enabled: true
    tag: latest
    containerPort: 80
    nodePort: 30088
    type: backend
    host: storefront.yas.lethanhcong.site

  # 10. storefront-ui (storefront)
  storefront:
    enabled: true
    tag: latest
    containerPort: 3000
    nodePort: 30089
    type: ui

  # 11. backoffice-bff
  backoffice-bff:
    enabled: true
    tag: latest
    containerPort: 80
    nodePort: 30090
    type: backend
    host: backoffice.yas.lethanhcong.site

  # 12. backoffice-ui (backoffice)
  backoffice:
    enabled: true
    tag: latest
    containerPort: 3000
    nodePort: 30091
    type: ui

  # 13. swagger-ui
  swagger-ui:
    enabled: true
    tag: v4.16.0
    containerPort: 8080
    nodePort: 30092
    type: swagger
    image: swaggerapi/swagger-ui
    host: swagger.yas.lethanhcong.site

  # 14. sampledata
  sampledata:
    enabled: true
    tag: latest
    containerPort: 80
    nodePort: 30093
    type: backend
    databaseName: sampledata

  # 15. payment
  payment:
    enabled: false
    tag: latest
    containerPort: 80
    nodePort: 30094
    type: backend
    databaseName: payment

  # 16. payment-paypal
  payment-paypal:
    enabled: false
    tag: latest
    containerPort: 80
    nodePort: 30095
    type: backend
    databaseName: payment

  # 17. recommendation
  recommendation:
    enabled: true
    tag: latest
    containerPort: 80
    nodePort: 30096
    type: backend
    databaseName: recommendation

  # 18. webhook
  webhook:
    enabled: true
    tag: latest
    containerPort: 80
    nodePort: 30097
    type: backend
    databaseName: webhook

# ============================================================
# Spring Boot shared application config
# (rendered into ConfigMap, mounted to all backend services)
# ============================================================
applicationConfig:
  server:
    shutdown: graceful
    port: 80

  management:
    server:
      port: 8090
    health:
      readinessstate:
        enabled: true
      livenessstate:
        enabled: true
    endpoints:
      web:
        exposure:
          include: prometheus, health
    endpoint:
      health:
        probes:
          enabled: true
        show-details: always

  spring:
    threads:
      virtual:
        enabled: false
    lifecycle:
      timeout-per-shutdown-phase: 30s
    security:
      oauth2:
        resourceserver:
          jwt:
            issuer-uri: http://identity.yas.lethanhcong.site/auth/realms/Yas
        client:
          provider:
            keycloak:
              issuer-uri: http://identity.yas.lethanhcong.site/auth/realms/Yas
    datasource:
      url:
      username: ${POSTGRESQL_USERNAME}
      password: ${POSTGRESQL_PASSWORD}
      hikari:
        maximum-pool-size: 4
    kafka:
      bootstrap-servers: kafka-cluster-kafka-brokers.kafka:9092
      consumer:
        bootstrap-servers: kafka-cluster-kafka-brokers.kafka:9092
    elasticsearch:
      uris: http://elasticsearch-es-http.elasticsearch:9200
      username: elastic
      password: JbqJhEPOFE9VskmOLX4OXSod

  yas:
    services:
      cart: http://cart
      customer: http://customer
      inventory: http://inventory
      media: http://media
      order: http://order
      product: http://product
      search: http://search
      tax: http://tax
      sampledata: http://sampledata
      payment: http://payment
      payment-paypal: http://payment-paypal
      recommendation: http://recommendation
      webhook: http://webhook

# Swagger-UI config
swaggerUrls: "[{ url: 'http://api.yas.lethanhcong.site/product/v3/api-docs', name: 'Product' }, { url: 'http://api.yas.lethanhcong.site/cart/v3/api-docs', name: 'Cart' }, { url: 'http://api.yas.lethanhcong.site/order/v3/api-docs', name: 'Order' }, { url: 'http://api.yas.lethanhcong.site/customer/v3/api-docs', name: 'Customer' }, { url: 'http://api.yas.lethanhcong.site/search/v3/api-docs', name: 'Search' }, { url: 'http://api.yas.lethanhcong.site/tax/v3/api-docs', name: 'Tax' }, { url: 'http://api.yas.lethanhcong.site/payment/v3/api-docs', name: 'Payment' }]"
