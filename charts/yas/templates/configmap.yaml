{{/*
  ConfigMap: yas-configuration-configmap
  Contains shared Spring Boot application.yaml for all backend services
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: yas-configuration-configmap
  labels:
    {{- include "yas.labels" . | nindent 4 }}
data:
  application.yaml: |
    {{- .Values.applicationConfig | toYaml | nindent 4 }}
  logback.xml: |
    <?xml version="1.0" encoding="UTF-8" ?>
    <Configuration>
        <include resource="org/springframework/boot/logging/logback/defaults.xml" />
        <include resource="org/springframework/boot/logging/logback/console-appender.xml" />
        <property name="LOG_LEVEL" value="${LOG_LEVEL:-INFO}"/>
        <root level="INFO">
            <appender-ref ref="CONSOLE" />
        </root>
        <logger name="com.yas" level="${LOG_LEVEL}" additivity="false">
            <appender-ref ref="CONSOLE" />
        </logger>
    </Configuration>
---
{{/*
  ConfigMap: yas-gateway-routes-config
  Spring Cloud Gateway routes used by BFF services
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: yas-gateway-routes-config-configmap
  labels:
    {{- include "yas.labels" . | nindent 4 }}
data:
  gateway-routes-config.yaml: |
    spring:
      cloud:
        gateway:
          globalcors:
            add-to-simple-url-handler-mapping: true
            corsConfigurations:
              "[/**]":
                allowedOrigins: "*"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*"
          server:
            webflux:
              default-filters:
                - SaveSession
              routes:
                - id: api
                  uri: http://localhost
                  predicates:
                    - Path=/api-disabled-by-k8s/**
                - id: product_api
                  uri: http://product
                  predicates:
                    - Path=/api/product/**
                  filters:
                    - RewritePath=/api/(?<segment>.*), /${segment}
                    - TokenRelay=
                - id: cart_api
                  uri: http://cart
                  predicates:
                    - Path=/api/cart/**
                  filters:
                    - RewritePath=/api/(?<segment>.*), /${segment}
                    - TokenRelay=
                - id: order_api
                  uri: http://order
                  predicates:
                    - Path=/api/order/**
                  filters:
                    - RewritePath=/api/(?<segment>.*), /${segment}
                    - TokenRelay=
                    - AddResponseHeader=Access-Control-Allow-Origin, *
                - id: customer_api
                  uri: http://customer
                  predicates:
                    - Path=/api/customer/**
                  filters:
                    - RewritePath=/api/(?<segment>.*), /${segment}
                    - TokenRelay=
                - id: payment_api
                  uri: http://payment
                  predicates:
                    - Path=/api/payment/**
                  filters:
                    - RewritePath=/api/(?<segment>.*), /${segment}
                    - TokenRelay=
                - id: media_api
                  uri: http://media
                  predicates:
                    - Path=/api/media/**
                  filters:
                    - RewritePath=/api/media/(?<segment>.*), /${segment}
                    - TokenRelay=
                - id: location_api
                  uri: http://location
                  predicates:
                    - Path=/api/location/**
                  filters:
                    - RewritePath=/api/(?<segment>.*), /${segment}
                    - TokenRelay=
                - id: inventory_api
                  uri: http://inventory
                  predicates:
                    - Path=/api/inventory/**
                  filters:
                    - RewritePath=/api/(?<segment>.*), /${segment}
                    - TokenRelay=
                - id: rating_api
                  uri: http://rating
                  predicates:
                    - Path=/api/rating/**
                  filters:
                    - RewritePath=/api/(?<segment>.*), /${segment}
                    - TokenRelay=
                - id: tax_api
                  uri: http://tax
                  predicates:
                    - Path=/api/tax/**
                  filters:
                    - RewritePath=/api/(?<segment>.*), /${segment}
                    - TokenRelay=
                - id: promotion_api
                  uri: http://promotion
                  predicates:
                    - Path=/api/promotion/**
                  filters:
                    - RewritePath=/api/(?<segment>.*), /${segment}
                    - TokenRelay=
                - id: search_api
                  uri: http://search
                  predicates:
                    - Path=/api/search/**
                  filters:
                    - RewritePath=/api/(?<segment>.*), /${segment}
                    - TokenRelay=
                - id: recommendation_api
                  uri: http://recommendation
                  predicates:
                    - Path=/api/recommendation/**
                  filters:
                    - RewritePath=/api/(?<segment>.*), /${segment}
                    - TokenRelay=
                - id: webhook_api
                  uri: http://webhook
                  predicates:
                    - Path=/api/webhook/**
                  filters:
                    - RewritePath=/api/(?<segment>.*), /${segment}
                    - TokenRelay=
                - id: sampledata_api
                  uri: http://sampledata
                  predicates:
                    - Path=/api/sampledata/**
                  filters:
                    - RewritePath=/api/(?<segment>.*), /${segment}
                    - TokenRelay=
                - id: nextjs
                  uri: ${UI_HOST}
                  predicates:
                    - Path=/**
