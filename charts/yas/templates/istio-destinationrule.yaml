{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
---
apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: {{ $name }}
  labels:
    {{- include "yas.labels" $ | nindent 4 }}
    app: {{ $name }}
spec:
  host: {{ $name }}
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
    # Circuit breaker cấu hình cơ bản cho đồ án
    connectionPool:
      http:
        http1MaxPendingRequests: 100
        maxRequestsPerConnection: 10
      tcp:
        maxConnections: 100
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 10s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
{{- end }}
{{- end }}
