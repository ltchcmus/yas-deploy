{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    {{- include "yas.labels" $ | nindent 4 }}
    app: {{ $name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      labels:
        app: {{ $name }}
    spec:
      containers:
        - name: {{ $name }}
          image: {{ include "yas.imageName" (dict "global" $.Values.global "name" $name "svc" $svc) | quote }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: {{ $svc.containerPort }}
              protocol: TCP
            {{- if eq ($svc.type | default "backend") "backend" }}
            - name: metric
              containerPort: 8090
              protocol: TCP
            {{- end }}
          {{- if eq ($svc.type | default "backend") "backend" }}
          envFrom:
            - secretRef:
                name: yas-postgresql-credentials-secret
          env:
            - name: LOGGING_CONFIG
              value: /opt/yas/config/logback.xml
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://{{ $.Values.global.postgresql.host }}:{{ $.Values.global.postgresql.port }}/{{ $svc.databaseName | default $name }}"
            - name: SPRING_CONFIG_ADDITIONAL_LOCATION
              value: /opt/yas/config/application.yaml
          volumeMounts:
            - mountPath: /opt/yas/config
              name: yas-configuration
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: metric
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 20
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: metric
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 20
          {{- else if eq $svc.type "ui" }}
          env:
            - name: API_BASE_PATH
              value: "http://storefront.{{ $.Values.global.domain }}/api"
          {{- else if eq $svc.type "swagger" }}
          env:
            - name: BASE_URL
              value: /swagger-ui
            - name: URLS
              value: {{ $.Values.swaggerUrls | quote }}
          {{- end }}
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      {{- if eq ($svc.type | default "backend") "backend" }}
      volumes:
        - name: yas-configuration
          configMap:
            name: yas-configuration-configmap
      {{- end }}
      terminationGracePeriodSeconds: 30
{{- end }}
{{- end }}
