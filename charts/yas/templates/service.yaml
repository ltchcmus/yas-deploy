{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  labels:
    {{- include "yas.labels" $ | nindent 4 }}
    app: {{ $name }}
spec:
  type: {{ $.Values.global.serviceType | default "NodePort" }}
  selector:
    app: {{ $name }}
  ports:
    - name: http
      port: {{ $svc.containerPort }}
      targetPort: http
      protocol: TCP
      {{- if eq ($.Values.global.serviceType | default "NodePort") "NodePort" }}
      nodePort: {{ $svc.nodePort }}
      {{- end }}
    {{- if eq ($svc.type | default "backend") "backend" }}
    - name: metric
      port: 8090
      targetPort: metric
      protocol: TCP
    {{- end }}
{{- end }}
{{- end }}
